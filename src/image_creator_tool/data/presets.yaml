# yamllint disable rule:line-length
# Image Creator Tool - Style Presets
# Each preset defines a style wrapper around the user's subject.
# The subject gets interpolated into the prompt template at {subject}.

editorial:
  description: >-
    Dark editorial style — thin lines on black, muted palette, technical feel
  prompt: >-
    on pure black background, {subject}, thin pale gray and subtle orange line art, minimalist technical diagram aesthetic, clean vector style, sparse with lots of negative space, dark moody, no text, no labels
editorial-light:
  description: >-
    Light editorial style — thin dark lines on pure white, minimalist, airy
  prompt: >-
    on pure flat white background, {subject}, thin charcoal gray and subtle orange line art, minimalist technical diagram aesthetic, clean vector style, single-weight lines, no shading, no cross-hatching, sparse with lots of white negative space, light and airy, no text, no labels
blueprint:
  description: >-
    Technical blueprint — white/cyan lines on dark navy, engineering drawing feel
  prompt: >-
    technical blueprint drawing of {subject}, thin white and light cyan lines on dark navy #0a1628 background, engineering schematic style, precise geometric, grid dots in background, architectural, no text, clean
ink:
  description: >-
    Japanese ink wash — organic brushstrokes, minimal, high contrast
  prompt: >-
    {subject}, Japanese ink wash sumi-e style, black ink on off-white rice paper, minimal brushstrokes, negative space, organic flowing lines, zen aesthetic, monochrome, no text
risograph:
  description: >-
    Risograph print — flat colors, grain, slight misregistration, zine aesthetic
  prompt: >-
    {subject}, risograph print style, flat color fills with visible halftone grain, terracotta orange and sage green ink on cream paper, slight color misregistration, screen print texture, vintage zine aesthetic, no text
wireframe:
  description: >-
    3D wireframe — glowing edges on black, holographic feel
  prompt: >-
    {subject}, 3D wireframe mesh rendering on pure black background, thin glowing white and orange edge lines, transparent polygonal structure, holographic feel, no solid fills, technical visualization, no text
constellation:
  description: >-
    Star map — dots connected by faint lines, celestial feel
  prompt: >-
    {subject} depicted as a constellation pattern, small white dots connected by very faint thin lines on deep black sky background, scattered star dust, celestial map aesthetic, minimal, ethereal, no text
brutalist:
  description: >-
    Neobrutalist — bold shapes, black borders, hard shadows, flat saturated colors
  prompt: >-
    {subject}, neobrutalist graphic design style, bold geometric shapes, thick 3px black outlines, hard offset shadows, flat saturated colors orange and yellow on white, no gradients, no rounded corners, poster art, no text
grain:
  description: >-
    Film grain photo — moody, high ISO, warm tones, cinematic
  prompt: >-
    photograph of {subject}, heavy film grain ISO 3200, warm color grading, shallow depth of field, cinematic lighting, moody atmosphere, 35mm analog film look, slight vignette
neon-noir:
  description: >-
    Neon-on-black flat vector — pink & lime with violet accents, grain, negative space
  prompt: >-
    {subject}, bold flat vector illustration, neon pink and lime green with deep violet accents on a solid near-black background, thick bold linework, high contrast, strong film grain texture, flat minimal shading, generous black negative space, subject pops against the dark backdrop, vibrant yet simple, no text
