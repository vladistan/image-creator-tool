# Image Creator Tool Configuration
# Location: ~/.config/image-creator-tool/config.toml
#
# Environment variables (IMAGE_CREATOR_*) override these values.

# Default image generation provider
# Available: "gemini"
default_provider = "gemini"

# Default model alias (provider-specific)
# Gemini options: "flash", "pro", "flash-2.5"
default_model = "flash"

# Default style preset (see: image-creator-tool list-presets)
default_preset = ""

# Default platform sizing (see: image-creator-tool list-platforms)
default_platform = ""

# Default project name (groups outputs in subfolder)
default_project = ""

# Output directory for generated images
# Default: ~/.local/share/image-creator-tool/outputs/
output_dir = "~/.local/share/image-creator-tool/outputs"

# Sentry DSN for error tracking (optional)
sentry_dsn = ""
